<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Control Panel{% endblock %} — based-workspace</title>
  <script>
    // Set the dark class on <html> to match system preference so Tailwind's `dark:` variants fire.
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
  </script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Consolas', 'monospace'],
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/theme/material-darker.min.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/mode/yaml/yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/mode/markdown/markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.18/mode/yaml-frontmatter/yaml-frontmatter.min.js"></script>
  <style>
    [hx-get],[hx-post],[hx-put],[hx-delete]{cursor:pointer}
    .htmx-indicator{opacity:0;transition:opacity 200ms}
    .htmx-request .htmx-indicator{opacity:1}
    /* Inline code in markdown bodies — explicit colors so contrast survives dark mode. */
    .prose pre{background:rgb(24 24 27)!important;color:rgb(244 244 245)}
    .prose code:not(pre code){background:rgb(244 244 245);color:rgb(39 39 42);padding:0.1rem 0.4rem;border-radius:0.25rem;font-size:0.875em;font-weight:500;border:1px solid rgb(228 228 231)}
    .dark .prose code:not(pre code){background:rgb(39 39 42);color:rgb(244 244 245);border-color:rgb(63 63 70)}
    .prose code:not(pre code)::before,.prose code:not(pre code)::after{content:""}
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body class="h-full bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 font-sans antialiased">
  <div class="flex min-h-full">
    <aside class="hidden md:flex md:flex-col w-64 shrink-0 border-r border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900">
      <a href="/" class="flex items-center gap-2 px-5 h-14 border-b border-zinc-200 dark:border-zinc-800">
        <span class="flex h-7 w-7 items-center justify-center rounded-md bg-indigo-500 text-white">
          <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4"><path d="M10 2 2 6l8 4 8-4-8-4Zm0 6.4L2 4.4v8l8 4 8-4v-8l-8 4Z"/></svg>
        </span>
        <span class="flex flex-col leading-tight">
          <span class="text-sm font-semibold">based-workspace</span>
          <span class="text-[11px] uppercase tracking-wider text-zinc-500">control panel</span>
        </span>
      </a>
      <nav class="flex-1 px-3 py-4 space-y-1 text-sm">
        <a href="/" class="flex items-center gap-2 px-3 py-2 rounded-md text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800">
          <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4 text-zinc-400"><path d="M3 3h6v6H3V3Zm8 0h6v6h-6V3ZM3 11h6v6H3v-6Zm8 0h6v6h-6v-6Z"/></svg>
          Dashboard
        </a>
        <a href="/recipes/new" class="flex items-center gap-2 px-3 py-2 rounded-md text-zinc-700 dark:text-zinc-300 hover:bg-zinc-100 dark:hover:bg-zinc-800">
          <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4 text-zinc-400"><path d="M10 3a1 1 0 0 1 1 1v5h5a1 1 0 1 1 0 2h-5v5a1 1 0 1 1-2 0v-5H4a1 1 0 1 1 0-2h5V4a1 1 0 0 1 1-1Z"/></svg>
          New recipe
        </a>
      </nav>
      <div class="px-5 py-3 border-t border-zinc-200 dark:border-zinc-800 text-[11px] text-zinc-500">
        v0.1 · local
      </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
      <header class="sticky top-0 z-10 h-14 bg-white/80 dark:bg-zinc-900/80 backdrop-blur border-b border-zinc-200 dark:border-zinc-800 px-4 sm:px-6 flex items-center gap-4">
        <a href="/" class="md:hidden flex items-center gap-2">
          <span class="flex h-7 w-7 items-center justify-center rounded-md bg-indigo-500 text-white">
            <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4"><path d="M10 2 2 6l8 4 8-4-8-4Zm0 6.4L2 4.4v8l8 4 8-4v-8l-8 4Z"/></svg>
          </span>
          <span class="text-sm font-semibold">based</span>
        </a>
        <div class="flex-1 min-w-0 truncate text-sm text-zinc-500">
          {% block breadcrumb %}{% endblock %}
        </div>
        <div class="flex items-center gap-2 text-xs"
             id="health-indicator"
             hx-get="/api/health" hx-trigger="load, every 30s" hx-swap="innerHTML">
          <span class="text-zinc-400">checking…</span>
        </div>
      </header>

      <main class="flex-1 overflow-x-hidden">
        <div class="mx-auto max-w-6xl px-4 sm:px-6 py-6">
          {% block content %}{% endblock %}
        </div>
      </main>
    </div>
  </div>

  <!-- Slide-over panel: receives Run/Edit content via HTMX. Hidden by default. -->
  <div id="slide-over" class="fixed inset-0 z-30 hidden" aria-hidden="true">
    <div id="slide-over-backdrop" class="absolute inset-0 bg-black/50 transition-opacity opacity-0" data-close></div>
    <div class="absolute inset-y-0 right-0 max-w-full flex">
      <div id="slide-over-panel" class="w-screen max-w-3xl transform transition-transform duration-200 ease-out translate-x-full bg-zinc-50 dark:bg-zinc-950 shadow-2xl flex flex-col">
        <header class="h-14 px-5 border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between gap-4 bg-white dark:bg-zinc-900">
          <h2 id="slide-over-title" class="text-sm font-semibold tracking-tight truncate"></h2>
          <button type="button" data-close class="text-zinc-500 hover:text-zinc-900 dark:hover:text-zinc-100 p-1 rounded-md hover:bg-zinc-100 dark:hover:bg-zinc-800" aria-label="Close">
            <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5"><path d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"/></svg>
          </button>
        </header>
        <div class="flex-1 overflow-y-auto p-5 sm:p-6">
          <div id="slide-over-content"></div>
          <div id="slide-over-spinner" class="hidden text-center text-sm text-zinc-500 py-12">loading…</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const slide = document.getElementById('slide-over');
      const backdrop = document.getElementById('slide-over-backdrop');
      const panel = document.getElementById('slide-over-panel');
      const title = document.getElementById('slide-over-title');
      const content = document.getElementById('slide-over-content');
      const spinner = document.getElementById('slide-over-spinner');

      function open(label) {
        title.textContent = label || '';
        slide.classList.remove('hidden');
        slide.setAttribute('aria-hidden', 'false');
        document.body.classList.add('overflow-hidden');
        requestAnimationFrame(() => {
          backdrop.classList.remove('opacity-0');
          backdrop.classList.add('opacity-100');
          panel.classList.remove('translate-x-full');
          panel.classList.add('translate-x-0');
        });
      }
      function close() {
        backdrop.classList.add('opacity-0');
        backdrop.classList.remove('opacity-100');
        panel.classList.remove('translate-x-0');
        panel.classList.add('translate-x-full');
        setTimeout(() => {
          slide.classList.add('hidden');
          slide.setAttribute('aria-hidden', 'true');
          document.body.classList.remove('overflow-hidden');
          content.innerHTML = '';
        }, 200);
      }
      window.__slideOver = { open, close, content, spinner };

      slide.addEventListener('click', (e) => { if (e.target.closest('[data-close]')) close(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !slide.classList.contains('hidden')) close(); });

      // Wire any [data-slide-over] anchor to fetch via HTMX-style fetch + inject.
      document.addEventListener('click', (e) => {
        const a = e.target.closest('[data-slide-over]');
        if (!a) return;
        e.preventDefault();
        const url = a.getAttribute('href') || a.dataset.url;
        const label = a.dataset.title || a.textContent.trim();
        open(label);
        spinner.classList.remove('hidden');
        content.innerHTML = '';
        fetch(url, { headers: { 'X-Requested-With': 'fetch' } })
          .then(r => r.text())
          .then(html => {
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const article = doc.querySelector('article.min-w-0');
            spinner.classList.add('hidden');
            if (article) {
              content.appendChild(article);
              // Re-execute any inline <script> tags inside the swapped article.
              article.querySelectorAll('script').forEach(old => {
                const s = document.createElement('script');
                if (old.src) s.src = old.src; else s.textContent = old.textContent;
                old.parentNode.replaceChild(s, old);
              });
              // Tell htmx to scan the newly-injected DOM so attributes like
              // hx-post/hx-target on forms inside the slide-over actually wire up.
              if (window.htmx) window.htmx.process(article);
            } else {
              content.innerHTML = '<p class="text-sm text-rose-600">Could not extract content.</p>';
            }
          })
          .catch(err => {
            spinner.classList.add('hidden');
            content.innerHTML = '<p class="text-sm text-rose-600">Failed to load: ' + (err && err.message || err) + '</p>';
          });
      });
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
