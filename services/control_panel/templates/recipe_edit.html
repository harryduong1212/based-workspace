{% extends "recipe_detail.html" %}

{% block head_extra %}
{{ super() }}
<style>
  .CodeMirror { height: 65vh; border: 1px solid rgb(228 228 231); border-radius: 0.5rem; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 0.875rem; }
  .dark .CodeMirror { border-color: rgb(39 39 42); }
  /* Slightly shorter editor when shown inside the slide-over panel. */
  #slide-over-content .CodeMirror { height: calc(100vh - 18rem); }
</style>
{% endblock %}

{% block tab_content %}
<form hx-post="/recipes/{{ recipe.id }}/edit" hx-target="#save-result" hx-swap="innerHTML"
      onsubmit="document.getElementById('content_field').value = window.__cm_editor.getValue();"
      class="space-y-3"
      data-recipe-edit-form>
  <textarea name="content" id="content_field" class="hidden">{{ raw_content }}</textarea>
  <textarea id="cm_editor" class="w-full">{{ raw_content }}</textarea>
  <div class="flex items-center gap-3">
    <button type="submit"
            class="inline-flex items-center gap-1.5 px-4 py-2 rounded-md bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium shadow-sm">
      <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4"><path d="M3 4.5A1.5 1.5 0 0 1 4.5 3h8.586a1.5 1.5 0 0 1 1.06.44l3.414 3.414A1.5 1.5 0 0 1 18 7.914V15.5a1.5 1.5 0 0 1-1.5 1.5h-13A1.5 1.5 0 0 1 2 15.5v-11Zm5 0v3a1 1 0 0 0 1 1h2a1 1 0 0 0 1-1v-3H8Zm-2 7v4h8v-4a1 1 0 0 0-1-1H7a1 1 0 0 0-1 1Z"/></svg>
      Save
    </button>
    <p class="text-xs text-zinc-500">Refuses to save if YAML frontmatter is malformed. Audit warnings are reported but don't block.</p>
  </div>
</form>

<div id="save-result" class="mt-4"></div>

<script>
(function () {
  const ta = document.getElementById('cm_editor');
  if (!ta || ta.dataset.cmInited === '1') return;
  ta.dataset.cmInited = '1';
  const dark = document.documentElement.classList.contains('dark');
  window.__cm_editor = CodeMirror.fromTextArea(ta, {
    mode: { name: 'yaml-frontmatter', base: 'markdown' },
    lineNumbers: true,
    lineWrapping: true,
    indentUnit: 2,
    tabSize: 2,
    theme: dark ? 'material-darker' : 'default',
  });
  if (window.htmx) window.htmx.process(document.querySelector('[data-recipe-edit-form]'));
})();
</script>
{% endblock %}
