{% for status in statuses %}
<span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full font-medium ring-1 ring-inset
             {{ 'bg-emerald-50 text-emerald-700 ring-emerald-600/20 dark:bg-emerald-500/10 dark:text-emerald-300 dark:ring-emerald-500/30' if status.ok else 'bg-rose-50 text-rose-700 ring-rose-600/20 dark:bg-rose-500/10 dark:text-rose-300 dark:ring-rose-500/30' }}"
      title="{{ status.detail }}">
  <span class="h-1.5 w-1.5 rounded-full {{ 'bg-emerald-500' if status.ok else 'bg-rose-500' }}"></span>
  {{ status.name }}
</span>
{% endfor %}
