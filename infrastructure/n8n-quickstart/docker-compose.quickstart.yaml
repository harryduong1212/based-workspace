name: infrastructure-core-quickstart

services:
  # Shared AI Memory Database
  based-workspace-postgres:
    image: pgvector/pgvector:pg16
    container_name: based-workspace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_secret
      POSTGRES_DB: n8n_atom
    ports:
      - "5432:5432"
    volumes:
      - based-workspace-postgres-data:/var/lib/postgresql/data
    networks:
      - based-workspace-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n_atom"]
      interval: 10s
      timeout: 5s
      retries: 5

  # n8n-atom — Workflow automation engine (upstream pre-built image)
  n8n-atom:
    image: atom8n/n8n:fork
    container_name: n8n-atom
    restart: unless-stopped
    depends_on:
      based-workspace-postgres:
        condition: service_healthy
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5888
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      # Database (uses the shared Postgres)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=n8n_atom
      - DB_POSTGRESDB_HOST=based-workspace-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_secret
      # n8n settings
      - NODE_FUNCTION_ALLOW_EXTERNAL=axios,lodash
    ports:
      - "5678:5888"
    volumes:
      - n8n-atom-data:/home/node/.n8n
    networks:
      - based-workspace-net

  # MCP Inspector — Official diagnostics UI for MCP servers
  mcp-inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    container_name: mcp-inspector
    ports:
      - "6274:6274"
      - "6277:6277"
    environment:
      - HOST=0.0.0.0
      - CLIENT_PORT=6274
      - SERVER_PORT=6277
    depends_on:
      - n8n-atom
    networks:
      - based-workspace-net

volumes:
  based-workspace-postgres-data:
  n8n-atom-data:

networks:
  based-workspace-net:
    driver: bridge
    name: based-workspace-net
